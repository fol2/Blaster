<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blaster Smoke Tests</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #10131a;
        color: #f7fafc;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 760px;
      }

      h1 {
        margin-top: 0;
      }

      li {
        margin: 8px 0;
      }

      .pass {
        color: #86efac;
      }

      .fail {
        color: #fca5a5;
      }

      .harness {
        position: fixed;
        left: -1200px;
        top: 0;
        width: 800px;
        height: 500px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blaster Smoke Tests</h1>
      <ul id="results"></ul>
    </main>

    <div class="harness" aria-hidden="true">
      <span id="levelChip"></span>
      <span id="coinChip"></span>
      <span id="healthChip"></span>
      <span id="bossChip"></span>
      <canvas id="gameCanvas" width="800" height="500"></canvas>
      <div id="abilityMeter">
        <div id="abilityFill"></div>
        <span id="abilityText"></span>
      </div>
      <div id="overlay" class="hidden">
        <p id="overlayKicker"></p>
        <h1 id="overlayTitle"></h1>
        <p id="overlayBody"></p>
        <button id="primaryAction" type="button"></button>
        <button id="secondaryAction" type="button"></button>
      </div>
      <h2 id="selectedCharacterName"></h2>
      <p id="selectedCharacterMeta"></p>
      <meter id="healthMeter" min="0" max="100" value="100"></meter>
      <meter id="chargeMeter" min="0" max="100" value="100"></meter>
      <span id="shopBalance"></span>
      <button id="shopStartAction" type="button"></button>
      <div id="characterShop"></div>
      <div id="weaponShop"></div>
      <div id="armourShop"></div>
      <div id="itemShop"></div>
    </div>

    <script src="game-data.js?v=sprite-baddies"></script>
    <script src="game.js?v=sprite-baddies"></script>
    <script>
      const results = document.getElementById("results");
      const tests = [];

      function test(name, assertion) {
        tests.push({ name, assertion });
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      test("normal baddies award 3 coins", () => {
        assert(window.BlasterData.ENEMY_COIN_REWARD === 3, "Expected 3 coins per baddie.");
      });

      test("boss rewards scale from about 100 to 1000 coins", () => {
        assert(window.BlasterData.bossReward(1) === 100, "Level 1 boss reward should be 100.");
        assert(window.BlasterData.bossReward(500) === 1000, "Level 500 boss reward should be 1000.");
        assert(window.BlasterData.bossReward(250) > 500, "Middle levels should pay more than early levels.");
      });

      test("starter bosses are easier before the difficulty ramps up", () => {
        const firstBoss = window.BlasterData.levelConfig(1);
        const trainedBoss = window.BlasterData.levelConfig(31);
        assert(firstBoss.bossHealthMultiplier < 1, "Level 1 boss should have reduced health for starters.");
        assert(firstBoss.bossDamageMultiplier < firstBoss.enemyDamageMultiplier, "Level 1 boss attacks should be gentler than normal scaling.");
        assert(firstBoss.bossShotCount === 3, "Level 1 boss should fire fewer shots.");
        assert(firstBoss.bossShotCooldown > trainedBoss.bossShotCooldown, "Early boss shots should come more slowly.");
        assert(trainedBoss.bossShotCount === 5, "Later bosses should recover the full shot pattern.");
      });

      test("500 levels are supported", () => {
        assert(window.BlasterData.MAX_LEVEL === 500, "Expected exactly 500 levels.");
        assert(window.BlasterData.levelConfig(600).level === 500, "Level config should clamp above 500.");
      });

      test("force-field character is expensive and matches requested timing", () => {
        const character = window.BlasterData.characters.find((entry) => entry.id === "astra-warden");
        const maxCost = Math.max(...window.BlasterData.characters.map((entry) => entry.cost));
        assert(character, "Astra Warden should exist.");
        assert(character.cost === maxCost, "Force-field character should be one of the most expensive.");
        assert(character.ability.id === "force-field", "Expected force-field ability.");
        assert(character.ability.cooldown === 5, "Cooldown should be 5 seconds.");
        assert(character.ability.duration >= 15 && character.ability.duration <= 20, "Duration should be 15-20 seconds.");
      });

      test("all characters have RPG sprite styling data", () => {
        for (const character of window.BlasterData.characters) {
          assert(character.visual, `${character.name} should have sprite styling.`);
          assert(character.visual.hair, `${character.name} should have a hair or hood colour.`);
          assert(character.visual.tunic, `${character.name} should have an outfit colour.`);
          assert(character.visual.trim, `${character.name} should have trim detail.`);
        }
      });

      test("freezy knife costs 350 coins and freezes baddies", () => {
        const weapon = window.BlasterData.weapons.find((entry) => entry.id === "freezy-knife");
        assert(weapon, "Freezy Knife should exist.");
        assert(weapon.cost === 350, "Freezy Knife should cost 350 coins.");
        assert(weapon.freezeDuration > 0, "Freezy Knife should freeze enemies.");
      });

      test("shop catalogue has more fantasy gear", () => {
        const weaponIds = new Set(window.BlasterData.weapons.map((entry) => entry.id));
        const itemEffects = new Set(window.BlasterData.items.map((entry) => entry.effect));
        assert(window.BlasterData.weapons.length >= 16, "Expected a much larger weapon shop.");
        assert(window.BlasterData.armour.length >= 8, "Expected more armour choices.");
        assert(window.BlasterData.items.length >= 12, "Expected more passive shop items.");
        assert(weaponIds.has("royal-spear"), "Expected a spear in the weapon shop.");
        assert(weaponIds.has("oak-longbow"), "Expected a bow in the weapon shop.");
        assert(weaponIds.has("reaper-scythe"), "Expected a scythe in the weapon shop.");
        assert(itemEffects.has("speedBonus"), "Expected speed items.");
        assert(itemEffects.has("bossDamageMultiplier"), "Expected boss damage items.");
      });

      test("enemy and boss variety exists", () => {
        assert(window.BlasterData.enemies.length >= 5, "Expected at least five baddie types.");
        assert(window.BlasterData.bosses.length >= 4, "Expected at least four boss types.");
      });

      test("baddies render as pixel art", () => {
        assert(window.BlasterData.ENEMY_RENDER_STYLE === "pixel-art", "Expected baddies to use pixel-art rendering.");
        assert(window.BlasterData.ENEMY_ANIMATION_STYLE === "rpg-sprite-sheet", "Expected baddies to use RPG sprite-sheet movement.");
      });

      test("arena backgrounds use pixel terrain themes", () => {
        const themes = window.BlasterData.terrainThemes;
        const features = new Set(themes.map((theme) => theme.feature));
        assert(window.BlasterData.TERRAIN_RENDER_STYLE === "pixel-art", "Expected pixel-art terrain rendering.");
        assert(themes.length === 4, "Expected four terrain styles based on the reference images.");
        assert(features.has("meadow"), "Expected a meadow terrain.");
        assert(features.has("desert"), "Expected a desert terrain.");
        assert(features.has("crystal"), "Expected a crystal cave terrain.");
        assert(features.has("forest"), "Expected a forest terrain.");
        assert(window.BlasterData.terrainForLevel(1).id !== window.BlasterData.terrainForLevel(2).id, "Adjacent levels should use different terrain.");
      });

      test("money pickups have different coin values", () => {
        const moneyValues = window.BlasterData.moneyPickups.map((pickup) => pickup.value);
        assert(window.BlasterData.moneyPickups.length >= 4, "Expected several money pickup types.");
        assert(new Set(moneyValues).size === moneyValues.length, "Each money pickup type should have a different value.");
        assert(Math.min(...moneyValues) > 0, "Money pickup values should be positive.");
      });

      test("baddies and bosses use RPG sprite roles", () => {
        const spriteRoles = new Set([
          "bandit",
          "brute",
          "void-mage",
          "rogue",
          "frost-guard",
          "war-chief",
          "crystal-sorceress",
          "iron-warlord",
          "void-oracle"
        ]);
        const enemyShapes = window.BlasterData.enemies.map((enemy) => enemy.shape);
        const bossShapes = window.BlasterData.bosses.map((boss) => boss.shape);
        for (const enemy of window.BlasterData.enemies) {
          assert(spriteRoles.has(enemy.shape), `${enemy.name} should use an RPG sprite role.`);
          assert(enemy.visual && enemy.visual.tunic && enemy.visual.trim, `${enemy.name} should have sprite outfit data.`);
          assert(enemy.spriteWeapon, `${enemy.name} should have a sprite weapon.`);
        }
        for (const boss of window.BlasterData.bosses) {
          assert(spriteRoles.has(boss.shape), `${boss.name} should use an RPG sprite role.`);
          assert(boss.visual && boss.visual.tunic && boss.visual.trim, `${boss.name} should have sprite outfit data.`);
          assert(boss.spriteWeapon, `${boss.name} should have a sprite weapon.`);
        }
        assert(new Set(enemyShapes).size === enemyShapes.length, "Every baddie type should have its own silhouette.");
        assert(new Set(bossShapes).size === bossShapes.length, "Every boss type should have its own silhouette.");
      });

      test("shop opens from the menu and keeps a start button available", () => {
        const game = window.BlasterGame;
        game.state.level = 1;
        document.getElementById("secondaryAction").click();
        assert(game.state.screen === "shop", "Expected the menu shop action to open the shop.");
        assert(document.getElementById("shopStartAction").textContent === "Start level 1", "Expected the shop to show a start action.");
        assert(!document.getElementById("shopStartAction").disabled, "Shop start action should be available outside the arena.");
      });

      test("new passive items affect selected stats", () => {
        const game = window.BlasterGame;
        const state = game.state;
        state.selectedWeapon = "pulse-pistol";
        state.selectedArmour = "training-vest";
        state.owned.items.clear();
        const base = game.selectedStats();
        state.owned.items.add("swift-boots");
        state.owned.items.add("whetstone");
        state.owned.items.add("hawk-lens");
        state.owned.items.add("silver-quiver");
        const upgraded = game.selectedStats();
        assert(upgraded.speed > base.speed, "Swift Boots should increase speed.");
        assert(upgraded.damage > base.damage, "Whetstone should increase damage.");
        assert(upgraded.weapon.range > base.weapon.range, "Hawk Lens should increase weapon range.");
        assert(upgraded.weapon.projectileSpeed > base.weapon.projectileSpeed, "Silver Quiver should increase projectile speed.");
      });

      test("player uses sprite-sheet movement state", async () => {
        const game = window.BlasterGame;
        game.startLevel();
        game.state.enemies.length = 0;
        window.dispatchEvent(new KeyboardEvent("keydown", { key: "d" }));
        await wait(120);
        window.dispatchEvent(new KeyboardEvent("keyup", { key: "d" }));
        assert(game.state.player.facing === "right", "Moving right should use the right-facing sprite pose.");
        assert(game.state.player.moving, "Movement should mark the sprite as walking.");
        assert(game.state.player.walkTime > 0, "Walking should advance the sprite animation timer.");
      });

      test("baddies use facing and walk animation state", async () => {
        const game = window.BlasterGame;
        game.startLevel();
        game.state.enemies.length = 0;
        await wait(120);
        assert(game.state.enemies.length > 0, "Expected a baddie to spawn.");
        const enemy = game.state.enemies[0];
        await wait(160);
        assert(["up", "down", "left", "right"].includes(enemy.facing), "Baddie should track a sprite facing direction.");
        assert(enemy.moving, "Baddie should mark itself as moving while walking.");
        assert(enemy.walkTime > 0, "Baddie walking should advance animation time.");
      });

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      test("money lies around the arena and can be collected", async () => {
        const game = window.BlasterGame;
        const state = game.state;
        state.level = 1;
        game.startLevel();
        state.enemies.length = 0;
        const money = state.pickups.filter((pickup) => pickup.type === "money");
        const moneyValues = new Set(money.map((pickup) => pickup.value));
        assert(money.length >= window.BlasterData.moneyPickups.length, "Expected money pickups to spawn in the arena.");
        assert(moneyValues.size >= window.BlasterData.moneyPickups.length, "Expected spawned money to include different amounts.");
        const pickup = money[0];
        const before = state.coins;
        pickup.x = state.player.x;
        pickup.y = state.player.y;
        await wait(80);
        assert(state.coins === before + pickup.value, "Collecting money should add its value to coins.");
        assert(!state.pickups.includes(pickup), "Collected money should leave the arena.");
      });

      test("force field kills normal baddies inside it", async () => {
        const game = window.BlasterGame;
        const state = game.state;
        state.owned.characters.add("astra-warden");
        state.selectedCharacter = "astra-warden";
        game.startLevel();
        state.enemies.length = 0;
        state.projectiles.length = 0;
        const enemyType = window.BlasterData.enemies[0];
        state.enemies.push({
          id: "test-skitter",
          type: enemyType,
          x: state.player.x + 10,
          y: state.player.y,
          radius: enemyType.radius,
          health: 20,
          maxHealth: 20,
          speed: 0,
          touchDamage: 0,
          shootTimer: 10,
          freezeTimer: 0,
          scale: 1,
          boss: false
        });
        game.activateAbility();
        await wait(80);
        assert(state.activeAbility && state.activeAbility.id === "force-field", "Force field should be active.");
        assert(!state.enemies.some((enemy) => enemy.id === "test-skitter"), "Normal baddie should be removed by the force field.");
      });

      test("death flow shows GAME OVER", async () => {
        const game = window.BlasterGame;
        const state = game.state;
        game.startLevel();
        state.enemies.length = 0;
        state.screen = "dying";
        state.deathTimer = 1.3;
        state.player.health = 0;
        await wait(120);
        assert(document.getElementById("overlayTitle").textContent === "GAME OVER!", "Expected GAME OVER overlay.");
      });

      test("boss defeat flow shows level clear and grants reward", () => {
        const game = window.BlasterGame;
        const state = game.state;
        state.level = 9;
        const before = state.coins;
        game.clearLevel();
        assert(document.getElementById("overlayTitle").textContent === "YOU CLEARED THE LEVEL!", "Expected clear overlay.");
        assert(state.coins === before + window.BlasterData.bossReward(9), "Expected boss reward to be added.");
      });

      async function runTests() {
        let passed = 0;
        for (const entry of tests) {
          const item = document.createElement("li");
          try {
            await entry.assertion();
            item.className = "pass";
            item.textContent = `PASS: ${entry.name}`;
            passed += 1;
          } catch (error) {
            item.className = "fail";
            item.textContent = `FAIL: ${entry.name} - ${error.message}`;
          }
          results.append(item);
        }

        document.title = passed === tests.length ? "Blaster Smoke Tests Passing" : "Blaster Smoke Tests Failing";
      }

      runTests();
    </script>
  </body>
</html>
